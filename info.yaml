--- 
# Tiny Tapeout project information
project:
  title: "Dino-7: 7-Segment Runner Game"
  author: "Dr Sopes"
  discord: ""
  description: "A minimalist single-button endless runner game inspired by the Chrome Dinosaur game, rendered on a single 7-segment display. Features an LFSR of 32 bits, Hardware Difficulty Selector, and a High Score memory."
  language: "Verilog"
  clock_hz: 25000000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"

  # Your top module name must start with "tt_um_". Make it unique by including your github username
  top_module: "tt_um_dino7"

  # List your project's source files here.
  source_files:
    - "tt_um_dino7.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "Jump button (active high)"
  ui[1]: "Reset game (active high)"
  ui[2]: "Difficulty Selector LSB (00=Norm, 11=Insane)"
  ui[3]: "Difficulty Selector MSB"
  ui[4]: "LFSR seed bit 0"
  ui[5]: "LFSR seed bit 1"
  ui[6]: "LFSR seed bit 2"
  ui[7]: "LFSR seed bit 3"

  # Outputs (Horizontal mapping)
  uo[0]: "Segment a – obstacle far (spawning)"
  uo[1]: "Segment b – obstacle mid (approaching)"
  uo[2]: "Segment c – player on ground"
  uo[3]: "Segment d – obstacle has passed"
  uo[4]: "Segment e – player in air (jumping)"
  uo[5]: "Segment f – unused"
  uo[6]: "Segment g – obstacle close (collision zone)"
  uo[7]: "Decimal point – jump cooldown active / High Score indicator"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6